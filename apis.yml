    description: >-
      The DSG Sports Data API exposes live scores, statistics, historical data,
      player and team information, fixtures, results, and odds across 80-plus
      sports through a per-sport documentation tree at dsg-api.com. Operations
      follow a get_* convention (for example get_areas, get_competitions,
      get_matches, get_tables, get_teams, get_peoples, get_news, get_odds) and
      responses are available in JSON and XML.
