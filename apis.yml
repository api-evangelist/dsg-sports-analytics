aid: dsg-sports-analytics
name: DSG Sports Analytics
description: >-
  DSG Sports Analytics, operated by Data Sports Group, is a sports data
  provider offering live scores, statistics, historical data, fixtures, player
  and team information, and odds across more than 80 sports including soccer,
  basketball, American football, cricket, tennis, ice hockey, e-sports, and
  Olympic disciplines. The DSG Sports Data API delivers this content in JSON
  and XML over HTTPS using credential-based authentication.
